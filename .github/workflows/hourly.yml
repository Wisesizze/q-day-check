# هذا الملف لازم يُرفع داخل مجلد اسمه بالضبط: .github/workflows/
# داخل نفس مستودع GitHub اللي فيه scrape_energy_tenders.py و requirements.txt
#
# وظيفته: يشغّل السكربت تلقائيًا كل 6 ساعات على خوادم GitHub (مجانًا)
# ويحفظ النتائج (index.html) داخل المستودع نفسه، ثم تنشرها GitHub Pages.
#
# كاشف الأعطال: لو رجع الاستخراج صفر بطاقات بينما توجد بيانات سابقة،
# يخرج السكربت بحالة خطأ فتظهر علامة فشل حمراء ويرسل GitHub بريدًا تلقائيًا.
# خطوة الحفظ تعمل دائمًا (if: always) حتى يصل تنبيه "البيانات قديمة" إلى الموقع.
#
# البروكسي اختياري ولم نعد نحتاجه (ثبت أن اعتماد لا يحجب GitHub).
# لو احتجته يومًا، أضف هذي القيم في:
# Settings > Secrets and variables > Actions:
#   PROXY_SERVER / PROXY_USERNAME / PROXY_PASSWORD

name: فحص منافسات وزارة الطاقة كل 6 ساعات

on:
  schedule:
    - cron: "0 */6 * * *"   # كل 6 ساعات (بتوقيت UTC)
  workflow_dispatch: {}       # يسمح بتشغيله يدويًا من واجهة GitHub لتجربته

permissions:
  contents: write   # يسمح للمهمة بحفظ النتائج داخل المستودع

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
    steps:
      - name: تحميل الكود من المستودع
        uses: actions/checkout@v4

      - name: تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت المكتبات المطلوبة
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: تشغيل سكربت الفحص
        run: python scrape_energy_tenders.py

      - name: حفظ النتائج داخل المستودع
        if: always()   # يعمل حتى لو فشل الفحص، حتى يصل تنبيه "البيانات قديمة" للموقع
        run: |
          git config user.name "auto-bot"
          git config user.email "auto-bot@users.noreply.github.com"
          git add energy-ministry-tenders.html index.html tenders_data.json
          git commit -m "تحديث تلقائي لمنافسات وزارة الطاقة" || echo "لا يوجد تغيير"
          git push
